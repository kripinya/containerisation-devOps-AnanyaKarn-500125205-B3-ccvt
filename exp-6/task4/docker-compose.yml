version: '3.8'

services:
  db:
    image: postgres:13
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: appdb
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - custom-network
      
  backend:
    image: node:18-alpine
    environment:
      DB_HOST: db
      DB_USER: user
      DB_PASSWORD: password
    ports:
      - "3000:3000"
    depends_on:
      - db
    networks:
      - custom-network

volumes:
  pgdata:

networks:
  custom-network:

version: '3.8'

services:
  db:
    build:
      context: ./database
      dockerfile: Dockerfile
    container_name: assignment1_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: assignment1
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app_network
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: assignment1_backend
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgrespassword
      - DB_NAME=assignment1
      - PORT=3000
    ports:
      - "3000:3000"
    depends_on:
      - db
    networks:
      - app_network
    restart: always

volumes:
  pgdata:
    name: assignment1_pgdata

networks:
  app_network:
    external: true
